<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Từ vựng — Quả Quả nhút nhát</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f2;padding:1.5rem;color:#1a1a1a;font-size:14px}
h1{font-size:19px;font-weight:600;color:#111;margin-bottom:.25rem}
.subtitle{font-size:12px;color:#aaa;margin-bottom:1.2rem}

/* controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.85rem;align-items:center}
.main-input{flex:1;min-width:170px;padding:7px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#111}
.main-input:focus{outline:none;border-color:#999}
button.cat{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s;white-space:nowrap}
button.cat.active{background:#1a56db;color:#fff;border-color:#1a56db}
.stats{font-size:12px;color:#aaa;margin-bottom:.65rem}

/* speak btn */
.sp{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:12px;color:#555;transition:all .15s;flex-shrink:0;padding:0;line-height:1}
.sp:hover{background:#dbeafe;border-color:#93c5fd;color:#1a56db}
.sp.playing{background:#1a56db;border-color:#1a56db;color:#fff;animation:pulse .7s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.15)}}

/* vocab cards */
.vocab-list{display:flex;flex-direction:column;gap:0;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden;background:#fff;margin-bottom:2rem}
.vocab-row{border-bottom:1px solid #f0f0ec}
.vocab-row:last-child{border-bottom:none}
.vocab-main{display:grid;grid-template-columns:30px 1fr 1fr auto auto 26px;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s}
.vocab-main:hover{background:#fafaf8}
.vnum{font-size:11px;color:#bbb;text-align:center}
.vzh{font-size:17px;font-weight:600;color:#111;line-height:1.3}
.vpy{font-size:12px;color:#888;margin-top:1px}
.vvi{font-size:13px;color:#444}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.b-N{background:#dbeafe;color:#1e40af}
.b-V{background:#ede9fe;color:#5b21b6}
.b-ADJ{background:#fde8d8;color:#9a3412}
.b-ADV{background:#fef3c7;color:#92400e}
.b-PART{background:#dcfce7;color:#166534}
.b-PREP{background:#fee2e2;color:#991b1b}
.expand-icon{font-size:11px;color:#bbb;transition:transform .2s;user-select:none}
.expand-icon.open{transform:rotate(180deg)}

/* expandable panel */
.vocab-detail{display:none;padding:0 14px 14px 54px;background:#fafaf9;border-top:1px solid #f0f0ec}
.vocab-detail.show{display:block}

/* example sentences inside detail */
.detail-section{margin-top:10px}
.detail-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.detail-label span{display:inline-block;width:3px;height:12px;border-radius:2px;background:#1a56db}
.sent-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:8px}
.sent-item:last-child{margin-bottom:0}
.sent-texts{flex:1}
.sent-zh{font-size:14px;line-height:1.6;color:#111}
.sent-zh b{color:#c0392b}
.sent-py{font-size:11px;color:#aaa;margin-top:1px}
.sent-py b{color:#b85c3a;font-style:normal}
.sent-vi{font-size:12px;color:#666;font-style:italic;margin-top:1px}

/* etymology */
.etym-box{background:#fffbea;border:1px solid #fde68a;border-radius:8px;padding:9px 12px;margin-top:6px}
.etym-box .char-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px}
.char-block{text-align:center;min-width:48px}
.char-block .ch{font-size:20px;font-weight:600;color:#1a1a1a;line-height:1}
.char-block .ch-py{font-size:11px;color:#888;margin-top:2px}
.char-block .ch-mean{font-size:11px;color:#92400e;margin-top:1px}
.etym-desc{font-size:12px;color:#78350f;line-height:1.6}
.no-etym{font-size:12px;color:#aaa;font-style:italic}

/* grammar analysis */
.gram-box{margin-top:8px;padding:8px 10px;background:#f0f4ff;border:1px solid #c7d7f9;border-radius:8px}
.gram-title{font-size:10px;font-weight:600;color:#3b5bdb;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.gram-tokens{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.gram-token{border-radius:6px;border:1px solid;padding:4px 7px;text-align:center;min-width:36px}
.gram-token .gt-zh{font-size:14px;font-weight:600;display:block;line-height:1.3}
.gram-token .gt-role{font-size:9px;display:block;margin-top:2px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.gt-S{background:#dbeafe;border-color:#93c5fd;color:#1e3a8a}.gt-S .gt-role{color:#1d4ed8}
.gt-P{background:#ede9fe;border-color:#c4b5fd;color:#3b0764}.gt-P .gt-role{color:#6d28d9}
.gt-O{background:#dcfce7;border-color:#86efac;color:#14532d}.gt-O .gt-role{color:#15803d}
.gt-ADV{background:#fef3c7;border-color:#fcd34d;color:#451a03}.gt-ADV .gt-role{color:#92400e}
.gt-ADJ{background:#fde8d8;border-color:#fdba74;color:#7c2d12}.gt-ADJ .gt-role{color:#9a3412}
.gt-PART{background:#f0fdf4;border-color:#bbf7d0;color:#14532d}.gt-PART .gt-role{color:#166534}
.gt-PREP{background:#fee2e2;border-color:#fca5a5;color:#7f1d1d}.gt-PREP .gt-role{color:#991b1b}
.gt-CONJ{background:#f1f5f9;border-color:#cbd5e1;color:#0f172a}.gt-CONJ .gt-role{color:#475569}
.gram-note{font-size:11px;color:#4338ca;line-height:1.6;background:#eef2ff;border-radius:6px;padding:5px 8px}
.gram-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.gl-item{display:flex;align-items:center;gap:3px;font-size:10px;color:#666}
.gl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>

<h1>📖 Từ vựng — Quả Quả nhút nhát</h1>
<p class="subtitle">🔊 Nhấn nút loa để nghe &nbsp;|&nbsp; Nhấn hàng để xem câu ví dụ &amp; nguồn gốc từ</p>

<div class="controls">
  <input class="main-input" type="text" id="msearch" placeholder="Tìm chữ Hán, pinyin, nghĩa..." oninput="render()">
  <button class="cat active" onclick="setCat(this,'all')">Tất cả</button>
  <button class="cat" onclick="setCat(this,'N')">Danh từ</button>
  <button class="cat" onclick="setCat(this,'V')">Động từ</button>
  <button class="cat" onclick="setCat(this,'ADJ')">Tính từ</button>
  <button class="cat" onclick="setCat(this,'ADV')">Phó từ</button>
  <button class="cat" onclick="setCat(this,'PART')">Trợ từ</button>
  <button class="cat" onclick="setCat(this,'PREP')">Giới từ</button>
</div>
<div class="stats" id="stats"></div>
<div class="vocab-list" id="vocab-list"></div>

<script>
/* ===== TTS ===== */
let _ab=null;
speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
function speak(txt,btn,e){
  if(e){e.stopPropagation();}
  speechSynthesis.cancel();
  if(_ab){_ab.classList.remove('playing');_ab.textContent='🔊';}
  if(_ab===btn){_ab=null;return;}
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='zh-CN';u.rate=0.85;
  const vv=speechSynthesis.getVoices();
  const v=vv.find(x=>/zh[-_](CN|Hans)/i.test(x.lang))||vv.find(x=>x.lang.startsWith('zh'));
  if(v)u.voice=v;
  u.onstart=()=>{btn.classList.add('playing');btn.textContent='⏹';};
  u.onend=u.onerror=()=>{btn.classList.remove('playing');btn.textContent='🔊';if(_ab===btn)_ab=null;};
  _ab=btn;speechSynthesis.speak(u);
}

/* ===== DATA ===== */
const words=[
  {zh:"小松鼠",py:"xiǎo sōngshǔ",cat:"N",vi:"con sóc nhỏ",
   sents:[
     {raw:"小松鼠爬上了大树，找到了很多松果。",zhd:"<b>小松鼠</b>爬上了大树，找到了很多松果。",py:"<b>Xiǎo sōngshǔ</b> pá shàng le dà shù, zhǎodào le hěnduō sōngguǒ.",vi:"Con sóc nhỏ leo lên cây lớn, tìm thấy rất nhiều quả thông.",
      gram:{tokens:[{zh:"小松鼠",r:"S"},{zh:"爬上了",r:"P"},{zh:"大树",r:"O"},{zh:"找到了",r:"P"},{zh:"很多",r:"ADJ"},{zh:"松果",r:"O"}],note:"Câu ghép 2 vế: S+P+O / S(ẩn)+P+O. 爬上了 = leo lên (kết quả hoàn thành). 很多 là định ngữ bổ nghĩa cho 松果."}},
     {raw:"小松鼠的尾巴又大又蓬松。",zhd:"<b>小松鼠</b>的尾巴又大又蓬松。",py:"<b>Xiǎo sōngshǔ</b> de wěibā yòu dà yòu péngsōng.",vi:"Đuôi của con sóc nhỏ vừa to vừa xù.",
      gram:{tokens:[{zh:"小松鼠",r:"ADJ"},{zh:"的",r:"PART"},{zh:"尾巴",r:"S"},{zh:"又大",r:"P"},{zh:"又蓬松",r:"P"}],note:"Cấu trúc 又A又B = vừa A vừa B. 小松鼠的 là cụm định ngữ sở hữu bổ nghĩa cho 尾巴 (chủ ngữ)."}}
   ],
   etym:{chars:[{ch:"松",py:"sōng",mean:"cây thông / lỏng lẻo"},{ch:"鼠",py:"shǔ",mean:"chuột / loài gặm nhấm"}],desc:"松鼠 (sōngshǔ): nghĩa đen là 'chuột thông' — loài động vật hay sống trên cây thông và ăn quả thông. Chữ 鼠 là tượng hình, vẽ hình con chuột với đầu, thân và đuôi."}},

  {zh:"胆子",py:"dǎnzi",cat:"N",vi:"cái gan, sự dũng cảm",
   sents:[
     {raw:"他的胆子越来越大了，连黑暗都不怕。",zhd:"他的<b>胆子</b>越来越大了，连黑暗都不怕。",py:"Tā de <b>dǎnzi</b> yuèláiyuè dà le, lián hēiàn dōu bù pà.",vi:"Gan anh ấy ngày càng lớn, ngay cả bóng tối cũng không sợ.",
      gram:{tokens:[{zh:"他的",r:"ADJ"},{zh:"胆子",r:"S"},{zh:"越来越",r:"ADV"},{zh:"大",r:"P"},{zh:"了",r:"PART"},{zh:"连…都",r:"CONJ"},{zh:"不怕",r:"P"}],note:"越来越+ADJ = ngày càng. 连…都… = thậm chí… cũng… (nhấn mạnh mức độ cực đoan)."}},
     {raw:"妹妹的胆子很小，不敢一个人睡觉。",zhd:"妹妹的<b>胆子</b>很小，不敢一个人睡觉。",py:"Mèimei de <b>dǎnzi</b> hěn xiǎo, bù gǎn yīgèrén shuìjiào.",vi:"Em gái rất nhút nhát, không dám ngủ một mình.",
      gram:{tokens:[{zh:"妹妹的",r:"ADJ"},{zh:"胆子",r:"S"},{zh:"很小",r:"P"},{zh:"不敢",r:"ADV"},{zh:"一个人",r:"ADV"},{zh:"睡觉",r:"P"}],note:"很 tăng cường mức độ tính từ. 不敢+V = không dám làm gì. 一个人 là trạng ngữ cách thức (một mình)."}}
   ],
   etym:{chars:[{ch:"胆",py:"dǎn",mean:"túi mật / sự dũng cảm"},{ch:"子",py:"zi",mean:"hậu tố danh từ hóa"}],desc:"胆 (dǎn): gồm bộ 月 (thịt/cơ thể) + 詹 (âm). Người xưa tin rằng 'mật' (túi mật) là nơi chứa sự dũng cảm — ai có mật lớn thì dũng cảm. 子 là hậu tố biến từ thành danh từ thông dụng."}},

  {zh:"从来",py:"cónglái",cat:"ADV",vi:"chưa bao giờ (dùng với phủ định)",
   sents:[
     {raw:"他从来不迟到，每次都准时到。",zhd:"他<b>从来</b>不迟到，每次都准时到。",py:"Tā <b>cónglái</b> bù chídào, měi cì dōu zhǔnshí dào.",vi:"Anh ấy chưa bao giờ đi muộn, lần nào cũng đúng giờ.",
      gram:{tokens:[{zh:"他",r:"S"},{zh:"从来不",r:"ADV"},{zh:"迟到",r:"P"},{zh:"每次",r:"ADV"},{zh:"都",r:"ADV"},{zh:"准时",r:"ADV"},{zh:"到",r:"P"}],note:"从来不 = chưa bao giờ (phủ định tuyệt đối). 每次都 = lần nào cũng (khẳng định tuyệt đối). Hai vế đối lập nhau tạo nhấn mạnh."}},
     {raw:"我从来没有见过这么大的蜘蛛。",zhd:"我<b>从来</b>没有见过这么大的蜘蛛。",py:"Wǒ <b>cónglái</b> méiyǒu jiànguò zhème dà de zhīzhū.",vi:"Tôi chưa bao giờ thấy con nhện to đến vậy.",
      gram:{tokens:[{zh:"我",r:"S"},{zh:"从来没有",r:"ADV"},{zh:"见过",r:"P"},{zh:"这么大的",r:"ADJ"},{zh:"蜘蛛",r:"O"}],note:"从来没有+V过 = chưa từng bao giờ trải qua. 这么大的 là cụm định ngữ chỉ mức độ bổ nghĩa cho 蜘蛛."}}
   ],
   etym:{chars:[{ch:"从",py:"cóng",mean:"từ / theo"},{ch:"来",py:"lái",mean:"đến / từ trước đến nay"}],desc:"从来 = 'từ xưa đến nay'. 从 (từ) + 来 (đến) ghép lại chỉ một khoảng thời gian kéo dài từ quá khứ đến hiện tại. Luôn dùng với phủ định (不/没) để tạo nghĩa 'chưa bao giờ'."}},

  {zh:"不敢",py:"bù gǎn",cat:"V",vi:"không dám",
   sents:[
     {raw:"她不敢一个人过马路。",zhd:"她<b>不敢</b>一个人过马路。",py:"Tā <b>bù gǎn</b> yīgèrén guò mǎlù.",vi:"Cô ấy không dám một mình qua đường.",
      gram:{tokens:[{zh:"她",r:"S"},{zh:"不敢",r:"ADV"},{zh:"一个人",r:"ADV"},{zh:"过",r:"P"},{zh:"马路",r:"O"}],note:"不敢 là trạng ngữ phủ định ý chí. 一个人 = trạng ngữ cách thức (một mình). Chuỗi trạng ngữ: 不敢 → 一个人 → cùng bổ nghĩa cho vị ngữ 过."}},
     {raw:"他不敢告诉妈妈真相。",zhd:"他<b>不敢</b>告诉妈妈真相。",py:"Tā <b>bù gǎn</b> gàosu māma zhēnxiàng.",vi:"Anh ấy không dám nói thật với mẹ.",
      gram:{tokens:[{zh:"他",r:"S"},{zh:"不敢",r:"ADV"},{zh:"告诉",r:"P"},{zh:"妈妈",r:"O"},{zh:"真相",r:"O"}],note:"告诉 là động từ song tân: O1=妈妈 (người nhận), O2=真相 (nội dung). Cấu trúc: S + 不敢 + V + O1 + O2."}}
   ],
   etym:{chars:[{ch:"不",py:"bù",mean:"phủ định"},{ch:"敢",py:"gǎn",mean:"dám / can đảm"}],desc:"敢 (gǎn): tượng hình — vẽ tay cầm vũ khí, ý chỉ người dũng cảm dám cầm vũ khí chiến đấu. 不敢 = phủ định trực tiếp, 'không dám làm gì đó'."}},

  {zh:"自己",py:"zìjǐ",cat:"ADV",vi:"tự mình, bản thân",
   sents:[
     {raw:"你要学会自己解决问题。",zhd:"你要学会<b>自己</b>解决问题。",py:"Nǐ yào xuéhuì <b>zìjǐ</b> jiějué wèntí.",vi:"Bạn phải học cách tự mình giải quyết vấn đề.",
      gram:{tokens:[{zh:"你",r:"S"},{zh:"要",r:"ADV"},{zh:"学会",r:"P"},{zh:"自己",r:"ADV"},{zh:"解决",r:"P"},{zh:"问题",r:"O"}],note:"要 = trợ động từ chỉ sự cần thiết. 学会 + [自己解决问题] = học cách [tự giải quyết]. 自己 là trạng ngữ bổ nghĩa cho 解决, nhấn mạnh tự làm."}},
     {raw:"她自己做了一个蛋糕送给妈妈。",zhd:"她<b>自己</b>做了一个蛋糕送给妈妈。",py:"Tā <b>zìjǐ</b> zuò le yīgè dàngāo sòng gěi māma.",vi:"Cô ấy tự tay làm một chiếc bánh tặng mẹ.",
      gram:{tokens:[{zh:"她",r:"S"},{zh:"自己",r:"ADV"},{zh:"做了",r:"P"},{zh:"一个蛋糕",r:"O"},{zh:"送给",r:"P"},{zh:"妈妈",r:"O"}],note:"Câu ghép nối tiếp: làm bánh → tặng mẹ. 了 = hoàn thành. 自己 nhấn mạnh chính tay cô ấy làm, không nhờ ai."}}
   ],
   etym:{chars:[{ch:"自",py:"zì",mean:"mình / tự"},{ch:"己",py:"jǐ",mean:"bản thân / cái tôi"}],desc:"自 (zì): tượng hình — vẽ hình cái mũi, vì người Trung Hoa cổ đại chỉ vào mũi khi nói 'tôi/mình'. 己 là thiên can thứ 6, dùng chỉ 'bản thân'. 自己 = nhấn mạnh chính bản thân mình làm, không nhờ người khác."}},

  {zh:"出门",py:"chūmén",cat:"V",vi:"ra ngoài, ra khỏi nhà",
   sents:[
     {raw:"下雨天，妈妈不让我出门玩。",zhd:"下雨天，妈妈不让我<b>出门</b>玩。",py:"Xià yǔ tiān, māma bù ràng wǒ <b>chūmén</b> wán.",vi:"Trời mưa, mẹ không cho tôi ra ngoài chơi.",
      gram:{tokens:[{zh:"下雨天",r:"ADV"},{zh:"妈妈",r:"S"},{zh:"不让",r:"P"},{zh:"我",r:"O"},{zh:"出门",r:"P"},{zh:"玩",r:"P"}],note:"让 = động từ khiến cách (cho phép). 不让+O+V = không cho ai làm gì. 出门玩 = chuỗi động từ: ra ngoài rồi chơi."}},
     {raw:"他每天早上八点出门去上学。",zhd:"他每天早上八点<b>出门</b>去上学。",py:"Tā měitiān zǎoshang bā diǎn <b>chūmén</b> qù shàngxué.",vi:"Mỗi sáng anh ấy ra khỏi nhà lúc 8 giờ để đi học.",
      gram:{tokens:[{zh:"他",r:"S"},{zh:"每天早上",r:"ADV"},{zh:"八点",r:"ADV"},{zh:"出门",r:"P"},{zh:"去",r:"P"},{zh:"上学",r:"P"}],note:"Chuỗi trạng ngữ thời gian: 每天→早上→八点 (từ rộng đến hẹp). 出门去上学 = chuỗi 3 động từ liên tiếp mô tả hành động nối nhau."}}
   ],
   etym:{chars:[{ch:"出",py:"chū",mean:"ra / thoát ra"},{ch:"门",py:"mén",mean:"cửa / cổng"}],desc:"出 (chū): tượng hình cổ đại — vẽ hình bàn chân bước ra khỏi cái hang/cửa. 门 (mén): tượng hình hai cánh cửa. 出门 = hành động bước ra qua cửa, nghĩa rộng là 'rời khỏi nhà'."}},

  {zh:"躲",py:"duǒ",cat:"V",vi:"trốn, ẩn nấp",
   sents:[
     {raw:"小猫躲在床底下，不肯出来。",zhd:"小猫<b>躲</b>在床底下，不肯出来。",py:"Xiǎo māo <b>duǒ</b> zài chuáng dǐ xia, bù kěn chūlái.",vi:"Con mèo nhỏ trốn dưới gầm giường, không chịu ra ngoài.",

   sents:[
     {raw:"请把书放在桌子上。",zhd:"请<b>把</b>书放在桌子上。",py:"Qǐng <b>bǎ</b> shū fàng zài zhuōzi shàng.",vi:"Hãy đặt quyển sách lên bàn.",
      gram:{tokens:[{zh:"请",r:"ADV"},{zh:"把",r:"PREP"},{zh:"书",r:"O"},{zh:"放",r:"P"},{zh:"在桌子上",r:"ADV"}],note:"把字句: S + 把 + O + V + 结果/地点. 请 = mệnh lệnh lịch sự. 把书放在桌子上 = cầm sách đặt lên bàn — nhấn mạnh sự tác động lên 书."}},
     {raw:"他把作业忘在家里了。",zhd:"他<b>把</b>作业忘在家里了。",py:"Tā <b>bǎ</b> zuòyè wàng zài jiā lǐ le.",vi:"Anh ấy để quên bài tập ở nhà.",
      gram:{tokens:[{zh:"他",r:"S"},{zh:"把",r:"PREP"},{zh:"作业",r:"O"},{zh:"忘",r:"P"},{zh:"在家里",r:"ADV"},{zh:"了",r:"PART"}],note:"把字句với kết quả tiêu cực: 把+O+忘+在+địa điểm. 了 = hoàn thành (đã xảy ra rồi). 在家里 = bổ ngữ địa điểm chỉ nơi bị bỏ quên."}}
   ],
   etym:{chars:[{ch:"把",py:"bǎ/bà",mean:"nắm / cầm / tay cầm"}],desc:"把 gốc nghĩa là 'nắm, cầm trong tay' (tượng hình bàn tay cầm vật). Từ đó phát triển thành giới từ — 'cầm vật' lên xử lý. Cấu trúc 把: Chủ ngữ + 把 + Tân ngữ + Động từ + Kết quả — nhấn mạnh sự tác động lên đối tượng."}},

  {zh:"对",py:"duì",cat:"PREP",vi:"với, đối với (giới từ chỉ đối tượng)",
   sents:[
     {raw:"她对我说了一句话，让我很感动。",zhd:"她<b>对</b>我说了一句话，让我很感动。",py:"Tā <b>duì</b> wǒ shuō le yī jù huà, ràng wǒ hěn gǎndòng.",vi:"Cô ấy nói với tôi một câu, khiến tôi rất xúc động."},
     {raw:"我们要对老人好一点。",zhd:"我们要<b>对</b>老人好一点。",py:"Wǒmen yào <b>duì</b> lǎorén hǎo yīdiǎn.",vi:"Chúng ta phải tốt hơn với người già."}
   ],
   etym:null},

  {zh:"在",py:"zài",cat:"PREP",vi:"ở, tại (giới từ địa điểm)",
   sents:[
     {raw:"我在图书馆学习，不要打扰我。",zhd:"我<b>在</b>图书馆学习，不要打扰我。",py:"Wǒ <b>zài</b> túshūguǎn xuéxí, búyào dǎrǎo wǒ.",vi:"Tôi đang học ở thư viện, đừng làm phiền tôi."},
     {raw:"猫在床下面睡着了。",zhd:"猫<b>在</b>床下面睡着了。",py:"Māo <b>zài</b> chuáng xiàmiàn shuì zháo le.",vi:"Con mèo đang ngủ dưới gầm giường."}
   ],
   etym:{chars:[{ch:"在",py:"zài",mean:"ở tại / tồn tại / đang"}],desc:"在 (zài): tượng hình — người đứng trên đất (土), ý chỉ hiện diện tại một nơi. Ba chức năng chính: (1) động từ 'ở tại' (他在家 = anh ấy ở nhà); (2) giới từ địa điểm (在学校学习); (3) chỉ hành động đang xảy ra (在看书 = đang đọc sách)."}},

  {zh:"往",py:"wǎng",cat:"PREP",vi:"về phía (giới từ hướng)",
   sents:[
     {raw:"请往前走，然后左转。",zhd:"请<b>往</b>前走，然后左转。",py:"Qǐng <b>wǎng</b> qián zǒu, ránhòu zuǒ zhuǎn.",vi:"Xin hãy đi thẳng về phía trước rồi rẽ trái."},
     {raw:"鸟儿往南飞，躲避冬天的寒冷。",zhd:"鸟儿<b>往</b>南飞，躲避冬天的寒冷。",py:"Niǎo er <b>wǎng</b> nán fēi, duǒbì dōngtiān de hánlěng.",vi:"Chim bay về phía nam để tránh cái lạnh mùa đông."}
   ],
   etym:{chars:[{ch:"往",py:"wǎng",mean:"đi về / hướng tới"}],desc:"往 (wǎng): gồm 彳(bước đi) + 主 (chủ/mục tiêu) — bước đi có chủ đích, hướng đến một mục tiêu. Chỉ hướng di chuyển, khác với 去 (đi, nhấn mạnh điểm đến) hay 向 (hướng về, mang tính trừu tượng hơn). 往左 = về phía trái."}}
];

/* ===== STATE ===== */
let currentCat='all';
let openRows=new Set();
const labels={N:'Danh từ',V:'Động từ',ADJ:'Tính từ',ADV:'Phó từ',PART:'Trợ từ',PREP:'Giới từ'};
let _idCount=0;
function uid(){return 'u'+(++_idCount);}

/* ===== RENDER ===== */
function render(){
  const q=document.getElementById('msearch').value.toLowerCase().trim();
  const filtered=words.filter(w=>(currentCat==='all'||w.cat===currentCat)&&(!q||w.zh.includes(q)||w.py.toLowerCase().includes(q)||w.vi.toLowerCase().includes(q)));
  const list=document.getElementById('vocab-list');
  if(!filtered.length){
    list.innerHTML='<div class="empty">Không tìm thấy từ nào</div>';
    document.getElementById('stats').textContent='';
    return;
  }
  list.innerHTML=filtered.map((w,i)=>{
    const rowId='r'+i+'_'+w.zh;
    const spId=uid();
    const isOpen=openRows.has(rowId);

    /* example sentences */
    const roleLabel={S:'Chủ ngữ',P:'Vị ngữ',O:'Tân ngữ',ADV:'Trạng ngữ',ADJ:'Định ngữ',PART:'Trợ từ',PREP:'Giới từ',CONJ:'Liên từ'};
    const sentHtml=w.sents.map((s,si)=>{
      const sid=uid();
      const safeRaw=s.raw.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      let gramHtml='';
      if(s.gram){
        const tokens=s.gram.tokens.map(t=>`<div class="gram-token gt-${t.r}"><span class="gt-zh">${t.zh}</span><span class="gt-role">${t.r}</span></div>`).join('');
        gramHtml=`<div class="gram-box">
          <div class="gram-title">🔬 Phân tích ngữ pháp</div>
          <div class="gram-tokens">${tokens}</div>
          <div class="gram-note">${s.gram.note}</div>
        </div>`;
      }
      return `<div class="sent-item">
        <button class="sp" id="${sid}" onclick="speak('${safeRaw}',document.getElementById('${sid}'))">🔊</button>
        <div class="sent-texts">
          <div class="sent-zh">${s.zhd}</div>
          <div class="sent-py">${s.py}</div>
          <div class="sent-vi">${s.vi}</div>
          ${gramHtml}
        </div>
      </div>`;
    }).join('');

    /* etymology */
    let etymHtml='';
    if(w.etym){
      const charBlocks=w.etym.chars.map(c=>`<div class="char-block"><div class="ch">${c.ch}</div><div class="ch-py">${c.py}</div><div class="ch-mean">${c.mean}</div></div>`).join('');
      etymHtml=`<div class="detail-section">
        <div class="detail-label"><span></span>Nguồn gốc chữ Hán</div>
        <div class="etym-box">
          <div class="char-row">${charBlocks}</div>
          <div class="etym-desc">${w.etym.desc}</div>
        </div>
      </div>`;
    } else {
      etymHtml=`<div class="detail-section"><div class="detail-label"><span></span>Nguồn gốc chữ Hán</div><div class="etym-box"><p class="no-etym">Từ ghép thông dụng / chưa có thông tin nguồn gốc chi tiết.</p></div></div>`;
    }

    const safeZh=w.zh.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="vocab-row" id="row-${rowId}">
      <div class="vocab-main" onclick="toggleRow('${rowId}')">
        <span class="vnum">${i+1}</span>
        <div>
          <div class="vzh">${w.zh}</div>
          <div class="vpy">${w.py}</div>
        </div>
        <div class="vvi">${w.vi}</div>
        <span class="badge b-${w.cat}">${labels[w.cat]}</span>
        <button class="sp" id="${spId}" onclick="speak('${safeZh}',document.getElementById('${spId}'),event)">🔊</button>
        <span class="expand-icon${isOpen?' open':''}">▼</span>
      </div>
      <div class="vocab-detail${isOpen?' show':''}" id="det-${rowId}">
        <div class="detail-section">
          <div class="detail-label"><span></span>Câu ví dụ</div>
          ${sentHtml}
        </div>
        ${etymHtml}
      </div>
    </div>`;
  }).join('');
  document.getElementById('stats').textContent=`Hiển thị ${filtered.length} / ${words.length} từ — nhấn hàng để xem chi tiết`;
}

function toggleRow(id){
  const det=document.getElementById('det-'+id);
  const row=document.getElementById('row-'+id);
  const icon=row.querySelector('.expand-icon');
  if(openRows.has(id)){openRows.delete(id);det.classList.remove('show');icon.classList.remove('open');}
  else{openRows.add(id);det.classList.add('show');icon.classList.add('open');}
}

function setCat(btn,cat){
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');currentCat=cat;openRows.clear();render();
}

render();
</script>
</body>
</html>
